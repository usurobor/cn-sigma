# One-off smoke test for notify-telegram.sh against real Telegram.
#
# Triggers:
#   1. workflow_dispatch — manual via Actions tab or `gh workflow run`
#   2. push to .cn-sigma/state/.notify-smoke-tickle — tickle-file commit
#      lets MCP-driven sessions fire the smoke without workflow:dispatch
#      permission. Each tickle commit (any content change) fires one run.
#
# Uses TELEGRAM_BOT_TOKEN secret to POST. Defaults send a benign
# "publisher v0 live" message to cn-sigma General topic; customize via
# workflow_dispatch inputs.

name: notify-smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target (cn-sigma | cnos | bumpt)'
        default: 'cn-sigma'
        required: true
      class:
        description: 'Class'
        default: 'doctrine-evolution'
        required: true
      summary:
        description: 'One-line summary'
        default: 'Notification publisher v0 live'
        required: true
      details:
        description: 'Optional details'
        default: 'PR #11 merged at cn-sigma after 3-round Bohmian convergence. End-to-end Telegram path now smoke-tested. Next: D34 wake-walker integration.'
        required: false
  push:
    paths:
      - '.cn-sigma/state/.notify-smoke-tickle'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send notification via notify-telegram.sh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Indirect via env vars (NOT inline ${{ }} in run script) to avoid
          # shell injection from inputs. Fallbacks let push-triggered runs
          # use the same defaults as workflow_dispatch.
          TARGET:  ${{ inputs.target  || 'cn-sigma' }}
          CLASS:   ${{ inputs.class   || 'doctrine-evolution' }}
          SUMMARY: ${{ inputs.summary || 'Notification publisher v0 live' }}
          DETAILS: ${{ inputs.details || 'PR #11 merged at cn-sigma after 3-round Bohmian convergence. End-to-end Telegram path now smoke-tested. Next: D34 wake-walker integration.' }}
        run: |
          .cn-sigma/scripts/notify-telegram.sh \
            "$TARGET" "$CLASS" "$SUMMARY" "$DETAILS"
