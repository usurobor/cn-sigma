# One-off smoke test for notify-telegram.sh against real Telegram.
#
# Triggers:
#   1. workflow_dispatch — manual via Actions tab or `gh workflow run`
#      with optional inputs (target/class/summary/details).
#   2. push to .cn-sigma/state/.notify-smoke-tickle — tickle-file commit
#      sends a fixed default payload (no inputs available for push).
#      Lets MCP-driven sessions fire smokes via commit since the GitHub
#      App backing the MCP integration lacks workflow:dispatch permission.

name: notify-smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target (cn-sigma | cnos | bumpt)'
        default: 'cn-sigma'
        required: true
      class:
        description: 'Class'
        default: 'doctrine-evolution'
        required: true
      summary:
        description: 'One-line summary'
        default: 'Notification publisher v0 live'
        required: true
      details:
        description: 'Optional details'
        default: 'PR #11 merged at cn-sigma. End-to-end Telegram path smoke-tested.'
        required: false
  push:
    paths:
      - '.cn-sigma/state/.notify-smoke-tickle'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Diagnostic step: which bot is the token, and can it see the chat?
      # Helps disambiguate "bot token wrong" from "bot not in chat" from
      # "chat_id format wrong." Safe to keep — getMe returns bot username
      # only; getChat returns chat metadata visible to that bot.
      - name: Diagnose bot + chat access
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -e
          CHAT_ID=$(yq eval '.supergroup.chat_id' .cn-sigma/state/notification-targets.yaml)
          echo "Routing config chat_id: $CHAT_ID"

          echo "--- getMe ---"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" \
            | jq '{ok, bot_username: .result.username, bot_id: .result.id, can_join_groups: .result.can_join_groups, can_read_all_group_messages: .result.can_read_all_group_messages}'

          echo "--- getChat (chat_id=$CHAT_ID) ---"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getChat?chat_id=${CHAT_ID}" \
            | jq '{ok, error: .description, chat_title: .result.title, chat_type: .result.type, chat_id: .result.id, is_forum: .result.is_forum}'

      # Push-trigger path: fires all three targets sequentially. Each
      # invocation is independent; any failure fails the job (bash -e).
      # This verifies General (cn-sigma) AND both custom topics (Cnos = 2,
      # Bumpt = 7) in one tickle.
      - name: Send to cn-sigma (General topic; doctrine-evolution)
        if: github.event_name == 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          .cn-sigma/scripts/notify-telegram.sh \
            cn-sigma \
            doctrine-evolution \
            "Notification publisher v0 live (3-target smoke)" \
            "PR #11 merged. Verifying General + Cnos + Bumpt routing end-to-end."

      - name: Send to cnos (custom topic 2; milestone)
        if: github.event_name == 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          .cn-sigma/scripts/notify-telegram.sh \
            cnos \
            milestone \
            "Notification routing live for cnos events" \
            "Future cnos releases / blockers / milestones / ci-failures will land here once the wake-walker (D34) is wired."

      - name: Send to bumpt (custom topic 7; milestone)
        if: github.event_name == 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          .cn-sigma/scripts/notify-telegram.sh \
            bumpt \
            milestone \
            "Notification routing live for bumpt events" \
            "Future bumpt events will land here. Legacy bumpt direct-post (bumpt:experiment/.ci/telegram-notify.sh) stays during migration; deprecate after parity verified."

      # workflow_dispatch path: respects user-supplied inputs.
      - name: Send (workflow_dispatch with inputs)
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET:  ${{ inputs.target }}
          CLASS:   ${{ inputs.class }}
          SUMMARY: ${{ inputs.summary }}
          DETAILS: ${{ inputs.details }}
        run: |
          .cn-sigma/scripts/notify-telegram.sh \
            "$TARGET" "$CLASS" "$SUMMARY" "$DETAILS"
