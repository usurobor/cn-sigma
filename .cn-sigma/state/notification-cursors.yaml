# Per-target last-notified home activation-thread timestamp.
#
# The notify-walk wake step (cn-sigma:.cn-sigma/scripts/notify-walk.sh)
# scans ALL files under cn-sigma:.cn-sigma/threads/activations/{target}/*.md
# in lexical order. Entries with frontmatter `class: substantive` or
# `class: directive-out` AND timestamp strictly greater than the cursor
# are POSTed to Telegram via notify-telegram.sh. On successful POST,
# the cursor advances to that entry's timestamp.
#
# Cross-day retry: scanning all sorted files means a POST failure late
# in day N stays in scope on day N+1; the failed entry's timestamp
# remains > cursor until it lands.
#
# Bootstrap policy: cursors are SEEDED to the latest activation-thread
# timestamp per target as of D34 merge. This prevents the first
# configured run from dumping the entire historical backlog into Telegram.
# Notifications begin from FUTURE events only — any new substantive or
# directive-out entry with timestamp strictly greater than the seeded
# cursor will fire. To explicitly re-seed (e.g., after extended Telegram
# downtime), update these values manually.
#
# Delivery semantics: AT-LEAST-ONCE. If POST succeeds but the cursor
# push (separate wake-yaml step) fails, the next wake will re-post.
# Duplicate Telegram messages are possible. Exactly-once requires
# message_id correlation; deferred.
#
# Schema: cnos.notification-cursors.v0

schema: cnos.notification-cursors.v0
cursors:
  # Seeded at D34 merge time (PR #12) to the latest activation-thread
  # timestamp per target. Future substantive entries fire; historical
  # backlog stays silent.
  cnos: "2026-07-02T15:17:38Z"
  bumpt: "2026-07-01T19:17:32Z"
