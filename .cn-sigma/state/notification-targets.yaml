# Notification targets — Telegram

**Schema:** `cnos.notification-targets.v0`
**Updated:** 2026-06-19 ET
**Status:** cnos topic configured; cn-sigma pulse topic TBD; bots/secrets to be wired at each hub

Canonical mapping of notification surfaces. Each entry is a Telegram destination (chat + topic) for a specific class of event. Wake workers / CI jobs read this file to know where to push.

```yaml
targets:

  bumpt:
    purpose: "bumpt CI/release notifications"
    bot: "@bump_sigma_bot"
    chat_id: "-1003973670137"
    topic_thread_id: "395"
    topic_name: "Bump Sigma"
    link_pattern: "https://t.me/c/3973670137/395"
    doc: "bumpt:docs/CI-TELEGRAM.md"
    status: live
    classes:
      - ci-pre
      - ci-post
      - release
      - blocker

  cnos:
    purpose: "cnos CI/release notifications + blocker escalation"
    bot: TBD                # pending operator confirmation: reuse @bump_sigma_bot or new bot
    chat_id: "-1004411092548"
    topic_thread_id: "2"
    topic_name: TBD         # set by operator at topic creation
    link_pattern: "https://t.me/c/4411092548/2"
    operator_anchor_message: "https://t.me/c/4411092548/2/3"
    doc: TBD                # cnos:docs/CI-TELEGRAM.md (planned; via cnos#agent/ci-notification)
    status: configured-target
    classes:
      - ci-pre
      - ci-post
      - release
      - blocker
    pending:
      - bot identity (reuse-vs-new)
      - bot token secret at cnos repo
      - notify script (replicate bumpt:experiment/.ci/telegram-notify.sh)
      - workflow integration (release tag + workflow failure + manual blocker push)

  cn-sigma-pulse:
    purpose: "daily pulse rollup; cross-hub aggregated"
    bot: TBD
    chat_id: TBD            # operator to provide topic link
    topic_thread_id: TBD
    topic_name: TBD         # e.g., "Sigma Pulse"
    link_pattern: TBD
    doc: TBD                # cn-sigma:.cn-sigma/spec/PULSE.md (planned)
    status: not-yet-configured
    classes:
      - daily-pulse
      - cross-hub-blocker-rollup
```

## Class semantics

- `ci-pre`: workflow about to run (release build starting, deploy starting). Green-short shape.
- `ci-post`: workflow completed. Green-short on success; red-detailed on failure.
- `release`: version tag pushed. Includes tag, summary, link to release notes.
- `blocker`: any wake / workflow detecting `outcome: failed` or `outcome: degraded` with `degraded_reason: <reason>`. Red-detailed; immediate push (not batched).
- `daily-pulse`: scheduled daily summary from cn-sigma γ-console. Markdown rollup.
- `cross-hub-blocker-rollup`: the pulse's blockers section, surfaced separately if any new blockers since last pulse.

## Format conventions

Per bumpt pattern (see `bumpt:docs/CI-TELEGRAM.md`):
- **Green-short**: title + status + sha + link
- **Red-detailed**: title + failed step + log excerpt + sha + link + operator-action-required line
- **No-op without secrets**: if the bot token secret isn't set, the notify step exits 0 silently (so private forks / CI without notification configured don't fail)
- **Topic-group support**: `TELEGRAM_TOPIC_ID` env var sets `message_thread_id` on the API call

## Update protocol

When a target's `status` changes from `configured-target` → `live`, update this file in the same commit that wires the notification. The `pending` checklist drives the wire-up sequence.

When a new target is added, append a new top-level key under `targets:` and an entry in the operator's hub-onboarding checklist.
