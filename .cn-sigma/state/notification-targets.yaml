# Notification targets — Telegram

**Schema:** `cnos.notification-targets.v0`
**Updated:** 2026-06-19 ET (Amendment: General-topic-for-cn-sigma; per-activation topics for cnos/bumpt)
**Status:** cnos topic configured; cn-sigma → General; bumpt topic pending

## Architecture (converged)

- **Publisher:** cn-sigma worker (wake-fired α at home; NOT γ-console session)
- **Bot:** single Sigma bot; token at cn-sigma as `TELEGRAM_BOT_TOKEN`
- **Supergroup:** one `chat_id` shared across all topics; stored as `TELEGRAM_CHAT_ID` secret
- **Topic routing:**
  - **cn-sigma's own voice** (γ-console events: daily pulse, doctrine evolution, cross-cutting) → **General** (no `message_thread_id`)
  - **Per-activation events** (cnos, bumpt) → respective topic (`message_thread_id` per target)

Activation bodies (cnos, bumpt) emit structured events to their own foreign log only; they hold NO Telegram credentials. cn-sigma worker reads foreign logs, decides notify class, posts to Telegram.

## Targets

Chat and topic IDs are routing config (not credentials) → inlined here. Only the bot token lives in repo secrets.

```yaml
supergroup:
  chat_id: -1004411092548
  link: "https://t.me/c/4411092548"

targets:

  cn-sigma:
    purpose: "Sigma's own voice — daily pulse, doctrine evolution, cross-activation rollup, escalation"
    topic_thread_id: 1         # General topic in supergroup -1004411092548
    topic_link: "https://t.me/c/4411092548/1"
    operator_anchor_message: "https://t.me/c/4411092548/1/5"
    status: configured-target
    classes:
      - daily-pulse
      - doctrine-evolution
      - cross-activation-rollup
      - escalation

  cnos:
    purpose: "cnos activation events: releases, blockers, milestones, ci-failures"
