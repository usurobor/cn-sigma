## Class semantics

- `daily-pulse`: scheduled daily rollup from cn-sigma worker; cross-activation summary. Routes to General.
- `doctrine-evolution`: convention/protocol updates, version bumps, wave landings. Routes to General.
- `cross-activation-rollup`: blockers or events touching multiple activations. Routes to General.
- `escalation`: urgent operator-attention. Routes to General (or future dedicated escalation topic).
- `release`: version tag pushed at activation. Routes to per-activation topic. Green-short format.
- `blocker`: any wake / workflow detecting `outcome: failed` or `outcome: degraded` at activation. Routes to per-activation topic. Red-detailed format.
- `milestone`: activation-level non-release event (e.g., bumpt LIVE, cnos foundation merged). Routes to per-activation topic.
- `ci-failure`: failed workflow run at activation. Routes to per-activation topic. Red-detailed.

## Mechanical flow (publisher)

```
cn-sigma wake fires (cron-driven)
  → walks each activation's foreign log from notification_cursor → HEAD
  → for each entry with `notify:` frontmatter field since last cursor:
      lookup target from notify.target field (cnos | bumpt | cn-sigma)
      resolve chat_id + topic_thread_id from notification-targets.yaml + secrets
      format message per class
      POST to Telegram sendMessage (omit message_thread_id if target == cn-sigma)
  → on success: advance notification_cursor per target
  → on failure: cursor doesn't advance; next wake retries (idempotent)
```

## Secrets at cn-sigma repo

Only ONE secret needed — the bot token. Chat and topic IDs are routing config (above), not credentials.

| Secret name | Status |
|---|---|
| `TELEGRAM_BOT_TOKEN` | set by operator |

Worker reads `chat_id` and `topic_thread_id` from this file directly. When the workflow file references this YAML, it reads `supergroup.chat_id` and `targets.<name>.topic_thread_id`, then calls `sendMessage` with both (or omits `message_thread_id` if `topic_thread_id: null`).

## Format conventions

Per bumpt pattern (see `bumpt:docs/CI-TELEGRAM.md`):
- **Green-short**: title + status + sha + link
- **Red-detailed**: title + failed step + log excerpt + sha + link + operator-action-required line
- **No-op without secrets**: if `TELEGRAM_BOT_TOKEN` absent, the notify step exits 0 silently (private deployments without Telegram don't fail wakes)
- **Idempotency**: per-target notification cursor in `.cn-sigma/state/notification-cursors.yaml`; advance only on successful POST

## Update protocol

When a target's `status` changes from `configured-target` → `live`, update this file in the same commit that wires the notification. The `pending` checklist drives the wire-up sequence.

When a new target is added, append a new top-level key under `targets:` and an entry in the operator's hub-onboarding checklist.

When General-vs-topic routing changes for a target, update its `topic_thread_id` field (or `topic_thread_id_secret`); workers re-read this file every wake.

